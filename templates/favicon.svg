<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#pg)" stroke-width="3" opacity="0.3"/>
  <!-- Left node -->
  <circle cx="28" cy="38" r="18" fill="url(#pg)" opacity="0.9"/>
  <circle cx="28" cy="32" r="7" fill="#FFF" opacity="0.8"/>
  <!-- Right node -->
  <circle cx="72" cy="38" r="18" fill="url(#ag)" opacity="0.9"/>
  <circle cx="72" cy="32" r="7" fill="#FFF" opacity="0.8"/>
  <!-- Bottom node -->
  <circle cx="50" cy="72" r="18" fill="url(#pg)" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="43" y1="48" x2="57" y2="48" stroke="#4F46E5" stroke-width="2.5" opacity="0.5"/>
  <line x1="36" y1="58" x2="45" y2="66" stroke="#4F46E5" stroke-width="2" opacity="0.4"/>
  <line x1="64" y1="58" x2="55" y2="66" stroke="#3B82F6" stroke-width="2" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="50" cy="48" r="4" fill="#FFF"/>
  <!-- Label "N" -->
  <text x="50" y="55" text-anchor="middle" fill="#FFF" font-family="sans-serif" font-weight="bold" font-size="18" opacity="0.85">N</text>
</svg>
